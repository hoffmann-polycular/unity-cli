name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Fail-fast guard: the git tag MUST agree with the canonical version in the
  # source tree. Without this, a tag push with a missed version bump would build
  # five binaries stamped vX.Y.Z against a tree whose connector still says
  # X.Y.(Z-1), and every install would explode at runtime with a
  # connector-version-mismatch error.
  #
  # unity-connector/package.json is the single source of truth (X.Y.Z, no
  # leading 'v'). The connector reads it at runtime via PackageInfo, and
  # flake.nix derives `version` from it (then stamps `-X main.Version=v${version}`),
  # so this is the only literal to check against the tag.
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches version in source
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          echo "Tag:             ${TAG}"
          echo "Tag (stripped):  ${TAG_VERSION}"

          PKG_VERSION=$(jq -r .version unity-connector/package.json)

          if [ "$PKG_VERSION" = "$TAG_VERSION" ]; then
            echo "  OK:   unity-connector/package.json = $PKG_VERSION"
          else
            echo "::error::unity-connector/package.json = '$PKG_VERSION' does not match tag '$TAG_VERSION'"
            echo "::error::Refusing to release: run 'go run ./tools/release ${TAG_VERSION}' before tagging."
            exit 1
          fi

  build:
    needs: verify-tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          VERSION="${GITHUB_REF_NAME}"
          go build -ldflags="-s -w -X main.Version=${VERSION}" -o "unity-cli-${GOOS}-${GOARCH}${EXT}" .

      - uses: actions/upload-artifact@v4
        with:
          name: unity-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: unity-cli-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: unity-cli-*
